app = "flykeep"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  FLYKEEP_DB_PATH = "/data/vault.db"
  FLYKEEP_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "flykeep_data"
  destination = "/data"
